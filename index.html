<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garfield Characters</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
        }

        select {
            font-size: 16px;
            padding: 5px 10px;
            margin-bottom: 20px;
        }

        #characterImage {
            display: block;
            margin: 0 auto;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <select id="characterSelect"></select>
    <br>
    <img id="characterImage" src="" alt="Character Image">

    <script>
        const characters = [
            { name: "Garfield",  file: "image/gafiled.jpg" },
            { name: "Odie",      file: "image/oide.jpg" },
            { name: "Nermal",    file: "image/nermo.webp" },
            { name: "Pooky",     file: "image/poky.jpeg" },
            { name: "Jon",       file: "image/jon.jpg" },
            { name: "Pain",      file: "image/2e93a657db4f0a271c30857b9ed037b6.jpg" },
            { name: "Itachi",    file: "image/902c215119634c49b503ad169c2812f0.jpg" },
            { name: "Madara",    file: "image/6b30e205f6c8a40f7d8d4ed50ec182d0.jpg" },
            { name: "Jiraiya",   file: "image/ef87848ab263d5f711da7e5782af2225.jpg" },
            { name: "Akatsuki",  file: "image/6d185e64d0154f06d4572d4a70e044c2.jpg" },
            { name: "Mikey",     file: "image/f1ab8197bf2f2b98391dbc7e24b87208.jpg" },
            { name: "Sanzu",     file: "image/8fbaf034835cc36f9b5a1e2c795dbbac.jpg" },
            { name: "Sano",      file: "image/3ccba3ac2da29454eb89d44179ee74ce.jpg" },
            { name: "King",      file: "image/4297a8e3ff0898264de35353b7e97431.jpg" }
        ];
        const select = document.getElementById("characterSelect");
        const image = document.getElementById("characterImage");

        characters.forEach(function (character) {
            const option = document.createElement("option");
            option.value = character.file;
            option.textContent = character.name;
            select.appendChild(option);
        });

        function updateImage() {
            const selected = select.options[select.selectedIndex];
            image.src = select.value;
            image.alt = selected.textContent;
        }

        select.addEventListener("change", updateImage);

        // Display the first character's image on load
        updateImage();
    </script>
</body>
</html>
